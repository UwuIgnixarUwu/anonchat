<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<!-- Оптимизация под мобильные устройства и запрет зума -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Скачать приложение</title>

<style>
  :root {
    --bg: #0f0f1a;
    --primary: #6a0dad;
    --primary-hover: #8a2be2;
    --header-bg: #2d0a4b;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    text-align: center;
    overflow: hidden;
  }

  header {
    background: var(--header-bg);
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top)); /* Отступ под челку */
    font-weight: bold;
    font-size: 18px;
    position: relative;
    flex-shrink: 0;
  }

  /* Ссылка обратно в чат */
  .back-link {
    position: absolute;
    left: 16px; /* Слева, так как это кнопка "Назад" */
    top: calc(16px + env(safe-area-inset-top));
    text-decoration: none;
    font-size: 20px;
    -webkit-tap-highlight-color: transparent;
  }

  .main-content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 90%;
    max-width: 400px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  p {
    opacity: 0.7;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .btn {
    display: block;
    padding: 18px;
    background: var(--primary);
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-size: 18px;
    font-weight: bold;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(106, 13, 173, 0.4);
  }

  .btn:active {
    transform: scale(0.95);
    background: var(--primary-hover);
  }

  .info {
    margin-top: 25px;
    font-size: 13px;
    opacity: 0.5;
    line-height: 1.6;
  }
</style>
</head>

<body>

  <header>
    <!-- Иконка "Назад в чат" в левом углу -->
    <a href="chat.html" class="back-link" title="Вернуться в чат">💬</a>
    Установка
  </header>

  <div class="main-content">
    <div class="container">
      <h1>📱 Скачать приложение</h1>
      <p>Анонимный чат теперь всегда под рукой.<br>Без регистрации и лишних данных.</p>

      <!-- ГЛАВНАЯ КНОПКА СКАЧИВАНИЯ[cite: 1] -->
      <a href="https://github.com/UwuIgnixarUwu/anonchat/releases/download/v1.1/anonkaa.apk" download class="btn">
        Скачать APK
      </a>

      <div class="info">
        Поддержка: Android 7.0+[cite: 1]<br>
        Если загрузка не началась — проверьте разрешения браузера[cite: 1]
      </div>
    </div>
  </div>

</body>
</html>
