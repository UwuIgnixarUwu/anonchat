<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Добавили user-scalable=no, чтобы избежать случайного зума при нажатиях -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Анонимный чат</title>
  <style>
    :root {
      --primary: #6a0dad;
      --primary-hover: #8a2be2;
      --bg: #0f0f1a;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* Убирает системную подсветку при тапе на iOS */
      -webkit-tap-highlight-color: transparent; 
    }
    .container {
      width: 85%;
      max-width: 350px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .btn {
      display: block;
      margin: 15px 0;
      padding: 18px;
      border-radius: 16px; /* Более современный скругленный квадрат */
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.1s active, background 0.3s;
      box-shadow: 0 4px 15px rgba(106, 13, 173, 0.3);
    }
    /* Эффект нажатия для телефонов */
    .btn:active {
      transform: scale(0.96);
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Анонимный чат</h1>
  <a href="chat.html" class="btn">Войти в чат</a>
  <a href="app.html" class="btn">Скачать приложение</a>
</div>
</body>
</html>
